<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>良辰图床</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#111113;--bg2:#19191c;--bg3:#222226;--bg4:#2a2a2f;
    --border:#2e2e33;--border2:#3a3a40;
    --text:#e8e8ec;--text2:#a0a0a8;--text3:#6a6a72;
    --accent:#6c5ce7;--accent2:#a29bfe;--accent-bg:rgba(108,92,231,.08);
    --danger:#e74c5c;--danger-bg:rgba(231,76,92,.08);
    --success:#00c48c;--success-bg:rgba(0,196,140,.08);
    --radius:10px;--radius-sm:6px;
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }

  /* ---- layout ---- */
  .wrap{max-width:960px;margin:0 auto;padding:24px 16px 60px}

  /* ---- header ---- */
  .header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px}
  .header .logo{display:flex;align-items:center;gap:10px}
  .header .logo span{font-size:20px;font-weight:600;letter-spacing:-.02em}
  .header .logo em{font-style:normal;font-size:13px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:20px}
  .header .user{display:flex;align-items:center;gap:8px}
  .header .user input{
    width:180px;padding:7px 12px;background:var(--bg2);border:1px solid var(--border);
    border-radius:var(--radius-sm);color:var(--text);font-size:13px;
    transition:border-color .2s;
  }
  .header .user input:focus{outline:none;border-color:var(--accent)}
  .header .user input::placeholder{color:var(--text3)}

  /* ---- buttons ---- */
  .btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:7px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);
    background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer;
    transition:all .15s;user-select:none;
  }
  .btn:hover{background:var(--bg4);border-color:var(--border2)}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:#5b4bd6;border-color:#5b4bd6}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--text2)}
  .btn.ghost:hover{color:var(--text);background:var(--bg3)}

  /* ---- upload zone ---- */
  .upload-area{
    border:1.5px dashed var(--border2);border-radius:var(--radius);
    padding:48px 24px;text-align:center;cursor:pointer;
    transition:all .2s;background:var(--bg2);margin-bottom:20px;
    position:relative;
  }
  .upload-area:hover,.upload-area.over{border-color:var(--accent);background:var(--accent-bg)}
  .upload-area .icon{font-size:36px;margin-bottom:8px;opacity:.6}
  .upload-area p{color:var(--text2);font-size:14px}
  .upload-area p small{display:block;margin-top:4px;font-size:12px;color:var(--text3)}
  .upload-area input{display:none}

  /* ---- result card ---- */
  .result{
    background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
    padding:16px;margin-bottom:20px;display:none;
  }
  .result.show{display:block}
  .result .title{font-size:13px;font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .result .title .dot{width:6px;height:6px;border-radius:50%;background:var(--success)}
  .result .row{display:flex;gap:6px;margin-bottom:8px}
  .result .row:last-child{margin-bottom:0}
  .result .row label{
    flex-shrink:0;width:48px;font-size:12px;color:var(--text3);
    line-height:32px;text-align:right;padding-right:8px;
  }
  .result .row input{
    flex:1;padding:6px 10px;background:var(--bg);border:1px solid var(--border);
    border-radius:var(--radius-sm);color:var(--text);font-size:12px;
    font-family:"SF Mono",Menlo,Consolas,monospace;
  }
  .result .row input:focus{outline:none;border-color:var(--accent)}
  .result .preview{margin-top:10px;border-radius:var(--radius-sm);overflow:hidden;max-height:100px;display:none}
  .result .preview img{height:100px;object-fit:cover;border-radius:var(--radius-sm)}

  /* ---- gallery ---- */
  .gallery-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .gallery-bar h2{font-size:15px;font-weight:500;color:var(--text)}
  .gallery-bar .count{font-size:12px;color:var(--text3);margin-left:8px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
  .card{
    background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
    overflow:hidden;position:relative;transition:border-color .2s;
  }
  .card:hover{border-color:var(--border2)}
  .card .img-wrap{position:relative;background:var(--bg);cursor:pointer;overflow:hidden}
  .card .img-wrap img{width:100%;height:150px;object-fit:cover;display:block;transition:transform .3s}
  .card:hover .img-wrap img{transform:scale(1.03)}
  .card .img-wrap .overlay{
    position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.55));
    opacity:0;transition:opacity .2s;display:flex;align-items:flex-end;justify-content:flex-end;padding:8px;gap:4px;
  }
  .card:hover .img-wrap .overlay{opacity:1}
  .card .meta{padding:8px 10px}
  .card .meta .name{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .meta .info{font-size:11px;color:var(--text3);margin-top:2px}

  /* ---- empty ---- */
  .empty{text-align:center;padding:60px 20px;color:var(--text3)}
  .empty .icon{font-size:40px;margin-bottom:10px;opacity:.4}
  .empty p{font-size:14px}

  /* ---- pagination ---- */
  .pager{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px}

  /* ---- toast ---- */
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    padding:8px 18px;background:var(--bg4);border:1px solid var(--border2);
    border-radius:var(--radius-sm);font-size:13px;color:var(--text);
    opacity:0;transition:all .25s;pointer-events:none;z-index:99;
    box-shadow:0 8px 24px rgba(0,0,0,.3);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---- responsive ---- */
  @media(max-width:600px){
    .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
    .header{flex-direction:column;gap:12px;align-items:flex-start}
    .header .user input{width:100%}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="logo">
      <span>良辰图床</span>
      <em>v1.0</em>
    </div>
    <div class="user">
      <input type="password" id="token" placeholder="输入访问凭证">
      <button class="btn sm" onclick="saveToken()">确认</button>
    </div>
  </div>

  <div class="upload-area" id="dropZone">
    <div class="icon">📤</div>
    <p>拖拽图片到这里，或者 <strong>点击选择文件</strong>
      <small>支持 JPG / PNG / GIF / WebP，单文件最大 10MB</small>
    </p>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif,image/webp" multiple>
  </div>

  <div class="result" id="result">
    <div class="title"><span class="dot"></span> 上传成功</div>
    <div class="row">
      <label>链接</label>
      <input type="text" id="rUrl" readonly>
      <button class="btn sm" onclick="copy('rUrl')">复制</button>
    </div>
    <div class="row">
      <label>缩略</label>
      <input type="text" id="rThumb" readonly>
      <button class="btn sm" onclick="copy('rThumb')">复制</button>
    </div>
    <div class="preview" id="rPreview"><img id="rPreviewImg"></div>
  </div>

  <div class="gallery-bar">
    <div style="display:flex;align-items:baseline">
      <h2>图片库</h2>
      <span class="count" id="totalCount"></span>
    </div>
    <button class="btn sm ghost" onclick="load(0)">刷新</button>
  </div>

  <div id="gallery"></div>
  <div class="pager" id="pager"></div>

</div>

<div class="toast" id="toast"></div>

<script>
const PAGE = 24;
let page = 0;

/* ---- token ---- */
function getToken(){ return localStorage.getItem('t')||'' }
function saveToken(){
  const v = document.getElementById('token').value.trim();
  if(!v) return;
  localStorage.setItem('t', v);
  toast('已保存');
  load(0);
}
document.getElementById('token').value = getToken();

/* ---- toast ---- */
let _tt;
function toast(s){
  const el=document.getElementById('toast');
  el.textContent=s;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),1800);
}

/* ---- upload ---- */
const drop=document.getElementById('dropZone');
const fi=document.getElementById('fileInput');

drop.onclick=()=>fi.click();
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};
drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{
  e.preventDefault();drop.classList.remove('over');
  goUpload(e.dataTransfer.files);
};
fi.onchange=()=>goUpload(fi.files);

async function goUpload(files){
  for(const f of files) await upload(f);
  fi.value='';
  load(0);
}

async function upload(file){
  const fd=new FormData();fd.append('file',file);
  try{
    const r=await fetch('/api/upload',{
      method:'POST',
      headers:{'Authorization':'Bearer '+getToken()},
      body:fd
    });
    if(!r.ok){
      const e=await r.json().catch(()=>({}));
      toast(e.error||'上传失败 ('+r.status+')');
      return;
    }
    const d=await r.json();
    document.getElementById('rUrl').value=d.url;
    document.getElementById('rThumb').value=d.thumb||'';
    const pv=document.getElementById('rPreview');
    const pi=document.getElementById('rPreviewImg');
    if(d.thumb){pi.src=d.thumb;pv.style.display='block'}
    else if(d.url){pi.src=d.url;pv.style.display='block'}
    else pv.style.display='none';
    document.getElementById('result').classList.add('show');
    toast('上传成功');
  }catch(e){toast('网络异常')}
}

function copy(id){
  const el=document.getElementById(id);
  el.select();el.setSelectionRange(0,99999);
  navigator.clipboard.writeText(el.value);
  toast('已复制');
}

/* ---- gallery ---- */
async function load(p){
  page=p;
  const g=document.getElementById('gallery');
  const pg=document.getElementById('pager');
  const tc=document.getElementById('totalCount');
  g.innerHTML='<div class="empty"><p>加载中…</p></div>';
  pg.innerHTML='';tc.textContent='';

  try{
    const r=await fetch(`/api/images?limit=${PAGE}&offset=${p*PAGE}`,{
      headers:{'Authorization':'Bearer '+getToken()}
    });
    if(!r.ok){g.innerHTML='<div class="empty"><div class="icon">😵</div><p>加载失败</p></div>';return}
    const d=await r.json();

    if(!d.items||!d.items.length){
      g.innerHTML='<div class="empty"><div class="icon">📷</div><p>还没有图片，上传一张试试</p></div>';
      return;
    }

    tc.textContent=`共 ${d.total} 张`;
    g.innerHTML='<div class="grid">'+d.items.map(i=>`
      <div class="card">
        <div class="img-wrap" onclick="window.open('${i.url}','_blank')">
          <img src="${i.thumb||i.url}" alt="${i.filename}" loading="lazy">
          <div class="overlay">
            <button class="btn sm" onclick="event.stopPropagation();cp('${i.url}')">链接</button>
            <button class="btn sm" onclick="event.stopPropagation();del('${i.id}')">删除</button>
          </div>
        </div>
        <div class="meta">
          <div class="name" title="${i.filename}">${i.filename}</div>
          <div class="info">${i.width}×${i.height} · ${sz(i.size)}</div>
        </div>
      </div>
    `).join('')+'</div>';

    // pager
    const tp=Math.ceil(d.total/PAGE);
    if(tp>1){
      let h='';
      if(p>0) h+=`<button class="btn sm" onclick="load(${p-1})">上一页</button>`;
      h+=`<span style="font-size:12px;color:var(--text3)">${p+1} / ${tp}</span>`;
      if(p<tp-1) h+=`<button class="btn sm" onclick="load(${p+1})">下一页</button>`;
      pg.innerHTML=h;
    }
  }catch(e){g.innerHTML='<div class="empty"><div class="icon">😵</div><p>网络异常</p></div>'}
}

function cp(url){navigator.clipboard.writeText(url);toast('已复制')}
async function del(id){
  if(!confirm('确认删除？')) return;
  try{
    const r=await fetch('/api/images/'+id,{
      method:'DELETE',headers:{'Authorization':'Bearer '+getToken()}
    });
    if(r.ok){toast('已删除');load(page)}else toast('删除失败');
  }catch(e){toast('网络异常')}
}
function sz(b){
  if(b<1024)return b+' B';
  if(b<1048576)return (b/1024).toFixed(1)+' KB';
  return (b/1048576).toFixed(1)+' MB';
}

load(0);
</script>
</body>
</html>
